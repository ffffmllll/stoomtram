<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bello Railway Tracker</title>
<style>
body{margin:0;background:#0f1115;color:white;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#app{padding:18px}.card{background:#1a1d24;border-radius:18px;padding:16px;margin-bottom:16px}
h1{text-align:center}.big-distance{text-align:center;font-size:56px;font-weight:bold}
.label{opacity:.7;margin-bottom:10px}.arrow-wrap{height:220px;display:flex;justify-content:center;align-items:center;position:relative}
.arrow{font-size:120px;transition:transform .15s linear}.route-arrow{color:#ffcc00}.rail-arrow{color:#4aa3ff}
.center-marker{width:10px;height:10px;border-radius:50%;background:#00ff88;position:absolute}
.progress-container{width:100%;height:22px;background:#2a2f38;border-radius:999px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#00aaff)}
#popup{position:fixed;top:20px;left:20px;right:20px;background:#00aaff;padding:18px;border-radius:18px;text-align:center;font-size:22px;display:none;z-index:9999}
#startBtn{position:fixed;top:20px;right:20px;z-index:9999;padding:16px 22px;border:none;border-radius:16px;background:#00aaff;color:white;font-size:18px;font-weight:bold}
select{width:100%;padding:14px;border-radius:14px;border:none;background:#2a2f38;color:white;font-size:18px}
</style>
</head>
<body>
<button id="startBtn">Start GPS</button>
<div id="popup"></div>
<div id="app">
<h1>Bello Railway</h1>
<div class="card"><div class="label">Walking Direction</div><select id="routeDirection"><option value="forward">Bergen → Bergen aan Zee</option><option value="reverse">Bergen aan Zee → Bergen</option></select></div>
<div class="card"><div class="label">Distance to Railway</div><div class="big-distance" id="distance">-- m</div></div>
<div class="card"><div class="label">Direction to Railway</div><div class="arrow-wrap"><div class="center-marker"></div><div class="arrow route-arrow" id="routeArrow">↑</div></div></div>
<div class="card"><div class="label">Railway Direction</div><div class="arrow-wrap"><div class="center-marker"></div><div class="arrow rail-arrow" id="railArrow">↑</div></div></div>
<div class="card"><div class="label">Route Progress</div><div class="progress-container"><div class="progress-bar" id="routeProgress"></div></div><div id="routeProgressText" style="margin-top:10px;">0%</div></div>
<div class="card"><div class="label">Stops</div><div id="stops"></div></div>
</div>
<script>
let userLat=null,userLon=null,heading=0,reverseRoute=false;
let route=[],routeDistances=[],totalRouteLength=0,stops=[],dunes=[];
const toRad=v=>v*Math.PI/180,toDeg=v=>v*180/Math.PI;
function haversine(a,b,c,d){const R=6371000,e=toRad(c-a),f=toRad(d-b),g=Math.sin(e/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(f/2)**2;return 2*R*Math.atan2(Math.sqrt(g),Math.sqrt(1-g))}
function bearing(a,b,c,d){const y=Math.sin(toRad(d-b))*Math.cos(toRad(c));const x=Math.cos(toRad(a))*Math.sin(toRad(c))-Math.sin(toRad(a))*Math.cos(toRad(c))*Math.cos(toRad(d-b));return(toDeg(Math.atan2(y,x))+360)%360}
function rotateArrow(el,target){el.style.transform=`rotate(${target-heading}deg)`}
async function loadKML(){const text=await fetch('Bello.kml').then(r=>r.text());const parser=new DOMParser();const xml=parser.parseFromString(text,'text/xml');const placemarks=xml.getElementsByTagName('Placemark');let segments=[];for(const pm of placemarks){const name=pm.getElementsByTagName('name')[0]?.textContent||'';const lineString=pm.getElementsByTagName('LineString')[0];const point=pm.getElementsByTagName('Point')[0];if(lineString){const coordsText=lineString.getElementsByTagName('coordinates')[0].textContent.trim();const coords=coordsText.split(/\s+/).map(c=>{const[lon,lat]=c.split(',').map(Number);return{lat,lon}});segments.push(coords)}if(point){const coordText=point.getElementsByTagName('coordinates')[0].textContent.trim();const[lon,lat]=coordText.split(',').map(Number);if(name.toLowerCase().includes('duin')){dunes.push({name,lat,lon,triggered:false})}else{stops.push({name,lat,lon})}}}mergeSegments(segments);buildStopUI()}
function mergeSegments(segments){route=[...segments[0]];for(let i=1;i<segments.length;i++){const seg=segments[i],end=route[route.length-1];const d1=haversine(end.lat,end.lon,seg[0].lat,seg[0].lon);const d2=haversine(end.lat,end.lon,seg[seg.length-1].lat,seg[seg.length-1].lon);if(d2<d1)seg.reverse();route.push(...seg)}totalRouteLength=0;routeDistances=[0];for(let i=1;i<route.length;i++){totalRouteLength+=haversine(route[i-1].lat,route[i-1].lon,route[i].lat,route[i].lon);routeDistances.push(totalRouteLength)}}
function nearestPoint(lat,lon){let bestDist=Infinity,bestIndex=0;for(let i=0;i<route.length;i++){const d=haversine(lat,lon,route[i].lat,route[i].lon);if(d<bestDist){bestDist=d;bestIndex=i}}return{index:bestIndex,point:route[bestIndex],distance:bestDist}}
function buildStopUI(){const container=document.getElementById('stops');for(const stop of stops){const div=document.createElement('div');div.style.marginBottom='18px';div.innerHTML=`<div style="margin-bottom:6px;">${stop.name}</div><div class="progress-container"><div class="progress-bar" id="stop-${stop.name}"></div></div>`;container.appendChild(div)}}
function update(){if(userLat==null||route.length===0)return;const nearest=nearestPoint(userLat,userLon);document.getElementById('distance').innerText=Math.round(nearest.distance)+' m';const toRail=bearing(userLat,userLon,nearest.point.lat,nearest.point.lon);rotateArrow(document.getElementById('routeArrow'),toRail);let railBearing;if(!reverseRoute){railBearing=bearing(route[nearest.index].lat,route[nearest.index].lon,route[Math.min(nearest.index+1,route.length-1)].lat,route[Math.min(nearest.index+1,route.length-1)].lon)}else{railBearing=bearing(route[Math.min(nearest.index+1,route.length-1)].lat,route[Math.min(nearest.index+1,route.length-1)].lon,route[nearest.index].lat,route[nearest.index].lon)}rotateArrow(document.getElementById('railArrow'),railBearing);let progress=routeDistances[nearest.index]/totalRouteLength;if(reverseRoute)progress=1-progress;document.getElementById('routeProgress').style.width=(progress*100).toFixed(1)+'%';document.getElementById('routeProgressText').innerText=(progress*100).toFixed(1)+'% complete';updateStops(progress);checkDunes()}
function updateStops(userProgress){for(const stop of stops){let nearestStopIndex=0,best=Infinity;for(let i=0;i<route.length;i++){const d=haversine(stop.lat,stop.lon,route[i].lat,route[i].lon);if(d<best){best=d;nearestStopIndex=i}}let stopProgress=routeDistances[nearestStopIndex]/totalRouteLength;if(reverseRoute)stopProgress=1-stopProgress;let pct=userProgress>=stopProgress?100:(userProgress/stopProgress)*100;const bar=document.getElementById(`stop-${stop.name}`);if(bar)bar.style.width=Math.min(pct,100)+'%'}}
function checkDunes(){const popup=document.getElementById('popup');for(const dune of dunes){if(dune.triggered)continue;const d=haversine(userLat,userLon,dune.lat,dune.lon);if(d<100){dune.triggered=true;popup.innerText=`Entering ${dune.name}`;popup.style.display='block';setTimeout(()=>popup.style.display='none',5000)}}}
async function enableOrientation(){if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){const permission=await DeviceOrientationEvent.requestPermission();if(permission!=='granted'){alert('Compass permission denied');return}}window.addEventListener('deviceorientation',e=>{if(e.webkitCompassHeading!=null){heading=e.webkitCompassHeading}else if(e.alpha!=null){heading=360-e.alpha}update()})}
document.getElementById('startBtn').addEventListener('click',async()=>{await enableOrientation();navigator.geolocation.watchPosition(pos=>{userLat=pos.coords.latitude;userLon=pos.coords.longitude;update()},err=>alert(err.message),{enableHighAccuracy:true,maximumAge:1000,timeout:10000});document.getElementById('startBtn').style.display='none'})
document.getElementById('routeDirection').addEventListener('change',e=>{reverseRoute=e.target.value==='reverse';update()})
loadKML();
</script>
</body>
</html>
